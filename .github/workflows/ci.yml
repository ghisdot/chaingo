name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vet, test, build & bench smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
      # Le paquet internal/stark génère de vraies preuves zk-STARK (lentes,
      # plusieurs minutes sur le runner CI) → on relève le timeout par défaut de
      # 10 min de `go test`. CI plus lente mais COUVERTURE COMPLÈTE.
      - run: go test -timeout 40m ./...
      - run: go build ./...
      # Le bench sert de test d'intégration : crypto PQ, mempool,
      # exécution des blocs, frais EIP-1559 — tout le chemin chaud.
      - run: go run ./cmd/chaingo bench --txs 2000 --senders 8

  cross-build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" -o "chaingo-$GOOS-$GOARCH$EXT" ./cmd/chaingo
      - uses: actions/upload-artifact@v4
        with:
          name: chaingo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: chaingo-*
