name: Release

# Pousser un tag "v*" (ex : v0.1.0) publie automatiquement les binaires
# Windows/Linux/macOS sur la page GitHub Releases.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build all platforms
        run: |
          mkdir -p dist
          for target in "linux amd64" "linux arm64" "windows amd64" "darwin amd64" "darwin arm64"; do
            set -- $target
            EXT=""; [ "$1" = "windows" ] && EXT=".exe"
            CGO_ENABLED=0 GOOS=$1 GOARCH=$2 go build -trimpath -ldflags="-s -w" \
              -o "dist/chaingo-$1-$2$EXT" ./cmd/chaingo
          done
          cd dist && sha256sum * > SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
