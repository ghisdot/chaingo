name: Deploy site (GitHub Pages)

# Déploie gratuitement le site vitrine + le wallet web sur GitHub Pages.
# Le wallet WASM est reconstruit à chaque déploiement → jamais de binaire
# obsolète, jamais de binaire versionné dans git.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "cmd/wallet-wasm/**"
      - "internal/crypto/**"
      - "internal/types/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build wallet WASM
        run: |
          GOOS=js GOARCH=wasm go build -trimpath -ldflags="-s -w" -o web/wallet/chaingo.wasm ./cmd/wallet-wasm
          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" web/wallet/wasm_exec.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
